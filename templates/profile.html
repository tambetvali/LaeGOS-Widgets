<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LaeGOS — Profile</title>

    <style>
        :root {
            --bg: #111;
            --win: #222;
            --text: #eee;
        }
        body.day {
            --bg: #f4f4f4;
            --win: #ffffff;
            --text: #111;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: auto;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
        }

        .wincontent {
            padding: 1.4rem 1.8rem;
            background: var(--win);
            min-height: 100%;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #333;
            border: 1px solid #666;
            border-radius: 6px;
            color: #eee;
            cursor: pointer;
            text-decoration: none;
            margin-right: 0.4rem;
        }
        body.day .btn {
            background: #ddd;
            border-color: #aaa;
            color: #111;
        }
        .btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body class="{{ 'day' if user.registry.SYSTEM_DAYNIGHTMODE == 'Day' if user and user.get('registry') else '' }}">
<div id="profile" class="wincontent">
    <h2>👤 LaeGOS User Profile</h2>

    {% if user %}
        <strong>{{ user.username or user.email }}</strong><br>
        {{ user.email }}<br>
        {% if user.name %}Name: {{ user.name }}<br>{% endif %}
        {% if user.picture %}
            <img src="{{ user.picture }}" width="64" height="64"
                 style="border-radius:50%; margin-top:0.5rem;">
        {% endif %}
    {% else %}
        <p>No user data.</p>
    {% endif %}

    <br><br>
    <a href="/" class="btn">⬅ Back</a>
    <a href="/auth/logout" class="btn">Log out</a>
</div>

<script src="{{ url_for('static', filename='js/winbox.bundle.min.js') }}"></script>

<script>
window.addEventListener("load", () => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const content = document.getElementById("profile");
    const desiredWidth  = Math.min(440, vw - 40);
    const desiredHeight = Math.min(Math.max(content.offsetHeight + 40, 260), vh - 40);

    const centerX = (vw - desiredWidth) / 2;
    const topY    = Math.max(20, (vh - desiredHeight) / 4);

    new WinBox({
        title: "👤 Profile",
        class: ["no-full", "no-max"],
        background: "var(--win)",
        border: 1,
        x: centerX,
        y: topY,
        width: desiredWidth,
        height: desiredHeight,
        mount: content
    });
});
</script>

</body>
</html>
