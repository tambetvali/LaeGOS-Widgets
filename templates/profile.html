<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LaeGOS — Profile</title>

    <style>
        html, body {
            height: 100%;
            background: #111;
            margin: 0;
            overflow: auto;
            color: #eee;
            font-family: system-ui, sans-serif;
        }

        .wincontent {
            padding: 1.4rem 1.8rem;
            background: #222;
            height: 100%;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #333;
            border: 1px solid #666;
            border-radius: 6px;
            color: #eee;
            cursor: pointer;
            text-decoration: none;
            margin-right: 0.4rem;
        }
        .btn:hover { background: #444; }
    </style>
</head>
<body>

<div id="profile" class="wincontent">
    <h2>👤 LaeGOS User Profile</h2>

    {% if user %}
        <strong>{{ user.username or user.email }}</strong><br>
        {{ user.email }}<br>
        {% if user.name %}Name: {{ user.name }}<br>{% endif %}
        {% if user.picture %}
            <img src="{{ user.picture }}" width="64" height="64" style="border-radius:50%; margin-top:0.5rem;">
        {% endif %}
    {% endif %}

    <br><br>
    <a href="/" class="btn">⬅ Back</a>
    <a href="/auth/logout" class="btn">Log out</a>
</div>

<script src="{{ url_for('static', filename='js/winbox.bundle.min.js') }}"></script>

<script>
window.addEventListener("load", () => {
    const centerX = window.innerWidth / 2 - 210;
    const topY    = window.innerHeight * 0.18;

    new WinBox({
        title: "👤 Profile",
        class: ["no-full", "no-max"],
        background: "#222",
        border: 1,
        x: centerX,
        y: topY,
        width: 420,
        height: 320,
        mount: document.getElementById("profile")
    });
});
</script>

</body>
</html>
