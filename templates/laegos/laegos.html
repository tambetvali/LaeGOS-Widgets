<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LaeGOS OS</title>

    <style>
        :root {
            --bg: #000;
            --fg: #f33;
            --panel: #111;
            --text: #eee;
        }
        body.day {
            --bg: #fafafa;
            --fg: #c00;
            --panel: #fff;
            --text: #111;
        }

        html, body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
        }

        .panel {
            background: var(--panel);
            padding: 1.2rem;
            min-height: 100%;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--fg);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 0.4rem;
        }
        .btn:hover { filter: brightness(1.15); }

        .screen {
            font-size: 1.6rem;
            letter-spacing: 0.2rem;
            padding: 0.6rem;
            background: #000;
            color: var(--fg);
            border: 2px solid var(--fg);
            border-radius: 6px;
            margin-bottom: 1rem;
            min-height: 2rem;
        }

        .helptext {
            line-height: 1.5;
            font-size: 0.95rem;
        }
    </style>

    <script src="{{ url_for('static', filename='js/winbox.bundle.min.js') }}"></script>
</head>

<body class="{{ 'day' if current_mode == 'Day' else 'night' }}"
      data-logged-in="{{ '1' if current_user else '0' }}">

<script>
window.addEventListener("load", () => {

    const loggedIn = document.body.dataset.loggedIn === "1";

    /* -------------------------------
       1. USER STATUS WINDOW
    --------------------------------*/
    const userPanel = document.createElement("div");
    userPanel.className = "panel";

    if (loggedIn) {
        userPanel.innerHTML = `
            <h2 style="color:var(--fg)">User Status</h2>
            <p><strong>{{ current_user.email }}</strong></p>
            {% if current_user.name %}<p>{{ current_user.name }}</p>{% endif %}
            {% if current_user.picture %}
                <img src="{{ current_user.picture }}" width="64" height="64"
                     style="border-radius:50%; margin-top:0.5rem;">
            {% endif %}
            <br><br>
            <a href="/auth/profile" class="btn">Manage</a>
            <a href="/auth/logout" class="btn">Logout</a>
        `;
    } else {
        userPanel.innerHTML = `
            <h2 style="color:var(--fg)">User Status</h2>
            <p>No user logged in.</p>
            <a href="/auth/login" class="btn">Log in</a>
        `;
    }

    new WinBox({
        title: "👤 User",
        class: ["no-full", "no-max"],
        background: "var(--panel)",
        border: 1,
        x: 40,
        y: 40,
        width: 300,
        height: 260,
        mount: userPanel
    });


    /* -------------------------------
       2. BINARY INPUT WINDOW (O/A)
    --------------------------------*/
    const binPanel = document.createElement("div");
    binPanel.className = "panel";

    binPanel.innerHTML = `
        <h2 style="color:var(--fg)">Binary Input</h2>
        <div id="screen" class="screen"></div>
        <button id="btnO" class="btn">O</button>
        <button id="btnA" class="btn">A</button>
        <button id="btnDel" class="btn">⌫</button>
    `;

    let screen = null;

    new WinBox({
        title: "🧮 Laegna Input",
        class: ["no-full", "no-max"],
        background: "var(--panel)",
        border: 1,
        x: 380,
        y: 60,
        width: 360,
        height: 260,
        mount: binPanel,
        oncreate: () => {
            screen = document.getElementById("screen");

            document.getElementById("btnO").onclick = () => {
                screen.textContent += "O";
            };
            document.getElementById("btnA").onclick = () => {
                screen.textContent += "A";
            };
            document.getElementById("btnDel").onclick = () => {
                screen.textContent = screen.textContent.slice(0, -1);
            };
        }
    });


    /* -------------------------------
       3. HELP WINDOW
    --------------------------------*/
    const helpPanel = document.createElement("div");
    helpPanel.className = "panel";

    helpPanel.innerHTML = `
        <h2 style="color:var(--fg)">LaeGOS Calculator OS</h2>
        <div class="helptext">
            <p>This is the early prototype of the LaeGOS calculator OS.</p>
            <p>It will synchronize a single Laegna number across:</p>
            <ul>
                <li>Base‑2 (O/A)</li>
                <li>Base‑4</li>
                <li>Base‑16</li>
            </ul>
            <p>Operations like <strong>+</strong>, <strong>-</strong>, <strong>*</strong>, <strong>/</strong>
               will store the current number, reset the input, and compute the result when <strong>=</strong> is pressed.</p>
            <p>The handheld prototype is here:<br>
               <a href="https://tn99tkkgqg.youware.app/" target="_blank" style="color:var(--fg)">tn99tkkgqg.youware.app</a></p>
            <p>More info at:<br>
               <a href="https://spireason.neocities.org" target="_blank" style="color:var(--fg)">spireason.neocities.org</a></p>
        </div>
    `;

    new WinBox({
        title: "❓ Help",
        class: ["no-full", "no-max"],
        background: "var(--panel)",
        border: 1,
        x: 200,
        y: 340,
        width: 420,
        height: 300,
        mount: helpPanel
    });

});
</script>

</body>
</html>
