<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>User Authentication</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
            margin: 0;
        }
        .container {
            padding: 1.5rem;
            text-align: center;
        }
        .info {
            opacity: 0.8;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>🔐 Redirecting to MongoDB Login…</h1>

    <div class="info">
        If you are not redirected automatically,  
        <a href="{{ oauth_url }}" style="color:#9cf;">click here</a>.
    </div>

    <script>
        // Auto‑redirect to MongoDB OAuth
        window.location.href = "{{ oauth_url }}";
    </script>

</div>
</body>
</html>
