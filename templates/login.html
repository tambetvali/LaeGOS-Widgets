<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MongoDB Login Test</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }
        .msg {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
        }
        .success {
            background: #0a0;
        }
        .error {
            background: #a00;
        }
    </style>
</head>
<body>

<h1>MongoDB Connection Test</h1>

{% if message %}
    <div class="msg {% if 'SUCCESS' in message %}success{% else %}error{% endif %}">
        {{ message }}
    </div>
{% endif %}

</body>
</html>
